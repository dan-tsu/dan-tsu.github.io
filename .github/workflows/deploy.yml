name: Deploy to GitHub Pages

# Builds the Astro site with bun and deploys it to GitHub Pages on every push to
# main. Nothing goes live until this repo is pushed to github.com/dan-tsu/dan-tsu.github.io
# AND Pages is enabled (Settings → Pages → Source: GitHub Actions).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Least-privilege permissions required by the Pages deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress live deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
